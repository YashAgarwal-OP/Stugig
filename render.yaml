##############################################################
# render.yaml — StuGig Deployment Configuration
#
# Defines two services:
#   1. stugig-backend  — Node.js/Express API + Socket.io (Web Service)
#   2. stugig-frontend — Vite React app              (Static Site)
#
# Deploy steps:
#   1. Push this repo to GitHub.
#   2. In Render dashboard → "New" → "Blueprint" → select this repo.
#   3. Render reads render.yaml and creates both services automatically.
#   4. Set the secret environment variables in Render's dashboard
#      (anything marked sync: false below).
#   5. After first deploy, copy the backend URL into the frontend's
#      VITE_API_URL env var and redeploy the frontend.
##############################################################

services:
  # ── Backend: Express API ────────────────────────────────────
  - type: web
    name: stugig-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in the Render dashboard — never commit real values
      - key: MONGO_URI
        sync: false          # MongoDB Atlas connection string
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Set to your Render frontend static site URL after first deploy
      # e.g. https://stugig.onrender.com
      - key: CLIENT_URL
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false          # e.g. https://stugig.onrender.com/payment/success
      - key: STRIPE_CANCEL_URL
        sync: false          # e.g. https://stugig.onrender.com/payment
      # Email (optional — app works without it)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ── Frontend: Vite React Static Site ───────────────────────
  - type: web
    name: stugig-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      # Security headers
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to your stugig-backend Render URL after it deploys
      # e.g. https://stugig-backend.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
